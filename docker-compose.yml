services:

  # --- Servidor Ollama (LLM local) ---
 # ollama:
 #   image: ollama/ollama:latest
 #   volumes:
 #     - ollama_models:/root/.ollama   # modelos persisten entre reinicios
 #   restart: unless-stopped

  # --- Backend FastAPI + RAG ---
  backend:
    build:
      context: ./deploy              # contexto = deploy/ (accede a Prototipo/ y WebScraping/)
      dockerfile: Prototipo/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

    restart: unless-stopped

  # --- Frontend Next.js ---
  frontend:
    build:
      context: ./deploy/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api     # browser llama /api/* → proxy interno → backend
    ports:
      - "5174:3000"                   # accesible en http://IP:5174
    environment:
      - BACKEND_URL=http://backend:8000  # proxy server-side usa esta URL interna
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_models:                      # mantiene los modelos descargados entre reinicios
